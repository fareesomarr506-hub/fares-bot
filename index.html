<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fares Bot - بوابة ربط الأجهزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark: #121212;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { margin-bottom: 0.5rem; font-size: 1.8rem; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }

        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            text-align: center;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        #result {
            margin-top: 2rem;
            display: none;
        }

        .code-box {
            background: #fff;
            color: #333;
            padding: 15px;
            border-radius: 12px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 10px 0;
        }

        .loading { display: none; margin: 10px 0; }
        .error { color: #ff4b2b; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <i class="fas fa-robot fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
    <h1>بوابة ربط Fares Bot</h1>
    <p>أدخل رقم الواتساب الخاص بك للحصول على كود الربط</p>

    <div class="input-group">
        <label>رقم الهاتف (بالصيغة الدولية)</label>
        <input type="number" id="phoneNumber" placeholder="مثال: 9665xxxxxxxx">
    </div>

    <button onclick="getPairingCode()" id="btnRequest">الحصول على الكود</button>

    <div class="loading" id="loader">
        <i class="fas fa-spinner fa-spin"></i> جاري طلب الكود...
    </div>

    <div id="result">
        <p>كود الربط الخاص بك هو:</p>
        <div class="code-box" id="pairingCode"></div>
        <p style="font-size: 0.7rem;">افتح الواتساب > الأجهزة المرتبطة > ربط برقم الهاتف وأدخل الكود أعلاه.</p>
    </div>

    <div id="errorMessage" class="error"></div>
</div>

<script>
    async function getPairingCode() {
        const number = document.getElementById('phoneNumber').value;
        const btn = document.getElementById('btnRequest');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const codeDisplay = document.getElementById('pairingCode');
        const errorDiv = document.getElementById('errorMessage');

        if (!number) {
            errorDiv.innerText = "الرجاء إدخال الرقم أولاً";
            return;
        }

        errorDiv.innerText = "";
        btn.style.display = "none";
        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            // الرابط المباشر للسيرفر الخاص بك
            const response = await fetch(`https://fares-bot.onrender.com/pair?number=${number}`);
            const data = await response.json();

            if (data.code) {
                codeDisplay.innerText = data.code;
                resultDiv.style.display = "block";
            } else {
                errorDiv.innerText = data.error || "فشل طلب الكود، تأكد من أن السيرفر يعمل";
                btn.style.display = "block";
            }
        } catch (err) {
            errorDiv.innerText = "حدث خطأ في الاتصال بالسيرفر. تأكد من تشغيل Render.";
            btn.style.display = "block";
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
