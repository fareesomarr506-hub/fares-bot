<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARES BOT - CONNECTION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-100px, -100px); }
            to { transform: translate(100px, 100px); }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .logo-area i {
            font-size: 50px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        h1 { font-weight: 700; font-size: 24px; margin-bottom: 10px; letter-spacing: 1px; }
        p { font-size: 14px; color: #aaa; margin-bottom: 30px; }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: #00d2ff;
            background: rgba(255,255,255,0.12);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #result {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .pairing-code {
            background: #fff;
            color: #000;
            padding: 15px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            margin: 15px 0;
            display: block;
            width: 100%;
            text-transform: uppercase;
        }

        .status { margin-top: 15px; font-size: 12px; color: #00d2ff; }
        .loading { display: none; color: #00d2ff; margin-bottom: 15px; font-weight: 600; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area">
        <i class="fas fa-shield-halved"></i>
    </div>
    <h1>FARES BOT SYSTEM</h1>
    <p>أدخل رقمك لربط الجهاز بالسيرفر السحابي</p>

    <div class="input-box">
        <input type="text" id="number" placeholder="مثال: 96777xxxxxxx">
    </div>

    <div class="loading" id="loader">
        <i class="fas fa-circle-notch fa-spin"></i> جاري استلام الكود من السيرفر...
    </div>

    <button id="submitBtn" onclick="sendPairingRequest()">الحصول على الكود</button>

    <div id="result">
        <p style="margin-bottom: 10px; color: #fff;">أدخل هذا الكود في هاتفك:</p>
        <div class="pairing-code" id="code"></div>
        <div class="status">
            <i class="fas fa-info-circle"></i> اذهب إلى: الأجهزة المرتبطة > ربط جهاز > الربط برقم الهاتف
        </div>
    </div>
    <div id="error" style="color: #ff4b2b; margin-top: 15px; font-size: 13px; font-weight: 600;"></div>
</div>

<script>
    async function sendPairingRequest() {
        const numberInput = document.getElementById('number');
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        const codeDisplay = document.getElementById('code');

        let number = numberInput.value.replace(/[^0-9]/g, '');

        if (!number || number.length < 8) {
            error.innerText = "⚠️ يرجى إدخال رقم هاتف صحيح مع رمز الدولة";
            return;
        }

        // تصفير الواجهة قبل الطلب
        error.innerText = "";
        result.style.display = "none";
        btn.disabled = true;
        btn.innerText = "جاري الاتصال...";
        loader.style.display = "block";

        try {
            // استخدام الرابط الخاص بك مباشرة مع دعم المسار الصحيح
            const apiUrl = `https://fares-bot.onrender.com/pair?phone=${number}`;
            
            const response = await fetch(apiUrl, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) throw new Error("السيرفر لا يستجيب حالياً");

            const data = await response.json();

            if (data.code) {
                codeDisplay.innerText = data.code;
                result.style.display = "block";
                loader.style.display = "none";
                btn.style.display = "none";
            } else if (data.error) {
                error.innerText = "❌ " + data.error;
                loader.style.display = "none";
                btn.disabled = false;
                btn.innerText = "إعادة المحاولة";
            }
        } catch (err) {
            console.error("Fetch Error:", err);
            error.innerText = "⚠️ تعذر الاتصال بالسيرفر. تأكد أن خدمة Render قيد التشغيل (Live).";
            loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "إعادة المحاولة";
        }
    }
    async function sendPairingRequest() {
    // التأكد من استهداف حقل الإدخال بشكل صحيح
    const numberInput = document.getElementById('number');
    const errorDiv = document.getElementById('error');
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    
    // تنظيف الرقم من أي فراغات أو رموز غير الأرقام
    let number = numberInput.value.trim().replace(/[^0-9]/g, '');

    // التحقق من أن الرقم ليس فارغاً
    if (!number) {
        errorDiv.innerText = "أدخل الرقم أولاً"; 
        return;
    }

    errorDiv.innerText = "";
    btn.style.display = "none";
    loader.style.display = "block";

    try {
        // استخدام متغير phone ليتطابق مع طلب السيرفر
        const response = await fetch(`https://fares-bot.onrender.com/pair?phone=${number}`);
        const data = await response.json();

        if (data.code) {
            document.getElementById('code').innerText = data.code;
            document.getElementById('result').style.display = "block";
            loader.style.display = "none";
        } else {
            errorDiv.innerText = data.error || "فشل توليد الكود";
            btn.style.display = "block";
            loader.style.display = "none";
        }
    } catch (err) {
        errorDiv.innerText = "تعذر الاتصال بالسيرفر";
        btn.style.display = "block";
        loader.style.display = "none";
    }
}

</script>

</body>
</html>
